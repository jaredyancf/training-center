# docker-compose.yml
version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_NAME=training_center
      - DB_USER=admin
      - DB_PASS=secret
      - PLACK_ENV=development
    depends_on:
      - db
    command: plackup -r -p 5000 app.psgi

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=training_center
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: